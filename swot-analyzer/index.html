<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWOT Analyzer - Evaluate Your Ideas!</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="logo"><i class="fas fa-lightbulb"></i> SWOT Analyzer</h1>
            <p>Analyze your startup idea, feature, or curiosity with AI-powered SWOT insights!</p>
        </header>

        <main>
            <section class="input-section">
                <textarea id="ideaInput" placeholder="Enter your idea here... e.g., An AI-powered personalized learning app for K-12 students"></textarea>
                <button id="analyzeBtn"><i class="fas fa-magic"></i> Generate SWOT &amp; Ideas</button>
            </section>

            <section id="varietySection">
                <h2><i class="fas fa-layer-group"></i> Explore Variety of Ideas by Field</h2>
                <div id="varietyGrid" class="variety-grid">
                    <!-- Populated by JS -->
                </div>
            </section>

            <section id="swotSection" class="hidden">
                <h2><i class="fas fa-chart-line"></i> SWOT Analysis</h2>
                <div class="swot-grid">
                    <div class="swot-card strengths">
                        <h3><i class="fas fa-thumbs-up"></i> Strengths</h3>
                        <ul id="strengthsList"></ul>
                    </div>
                    <div class="swot-card weaknesses">
                        <h3><i class="fas fa-thumbs-down"></i> Weaknesses</h3>
                        <ul id="weaknessesList"></ul>
                    </div>
                    <div class="swot-card opportunities">
                        <h3><i class="fas fa-rocket"></i> Opportunities</h3>
                        <ul id="opportunitiesList"></ul>
                    </div>
                    <div class="swot-card threats">
                        <h3><i class="fas fa-exclamation-triangle"></i> Threats</h3>
                        <ul id="threatsList"></ul>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>&amp;copy; 2024 SWOT Analyzer. Powered by creativity and market insights!</p>
        </footer>
    </div>

    <script src="script.js"></script>

</body>
</html>
